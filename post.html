<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
(function(){'use strict';
var article=document.getElementById('post-content'),params=new URLSearchParams(window.location.search),slug=params.get('slug');
if(!slug){article.innerHTML='<h1>Post not found</h1><p>Try heading back to <a href="blog.html" class="inline-link">the writing index</a>.</p>';return}
marked.setOptions({breaks:true,gfm:true,headerIds:true});
Promise.all([fetch('posts/posts.json',{cache:'no-cache'}).then(function(r){return r.json()}),fetch('posts/'+encodeURIComponent(slug)+'.md',{cache:'no-cache'}).then(function(r){if(!r.ok)throw new Error('Not found');return r.text()})]).then(function(res){
var posts=res[0],markdown=res[1];var meta=(Array.isArray(posts)?posts:[]).find(function(p){return p.slug===slug});
var body=markdown;var fm=body.match(/^---\s*[\s\S]*?---\s*/);if(fm)body=body.slice(fm[0].length);
var dateStr=meta&&meta.date?new Date(meta.date).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}):'';
var titleStr=meta&&meta.title?meta.title:slug;
document.title=titleStr+' — Ahnaf Akil';
article.innerHTML=(dateStr?'<time datetime="'+meta.date+'">'+dateStr+'</time>':'')+
'<h1>'+titleStr+'</h1>'+marked.parse(body);
}).catch(function(){article.innerHTML='<h1>Post not found</h1><p>Head back to <a href="blog.html" class="inline-link">the writing index</a>.</p>'});
})();
</script>
