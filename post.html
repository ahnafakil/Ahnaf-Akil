<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#181F22" />

  <title>Reading — Ahnaf Akil</title>
  <meta name="description" content="Essay from Ahnaf Akil." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23181F22'/%3E%3Ctext x='50' y='65' font-family='serif' font-size='48' font-style='italic' fill='%23889DA9' text-anchor='middle'%3Ea%3C/text%3E%3C/svg%3E" />
</head>
<body>

  <nav class="nav" aria-label="Primary">
    <a href="index.html" class="nav-brand">
      <span class="dot" aria-hidden="true"></span>
      Ahnaf Akil
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="blog.html">Writing</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <section style="padding-top: 140px;">
    <div class="container-narrow">

      <a href="blog.html" class="post-back">
        <span aria-hidden="true">←</span>
        Back to writing
      </a>

      <article class="glass post-article reveal" id="post-content">
        <p style="text-align:center; color: var(--text-tertiary); font-family: var(--font-mono); font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase;">
          Loading post...
        </p>
      </article>

      <div style="margin-top: var(--s-6); text-align: center;" class="reveal">
        <a href="blog.html" class="btn">
          <span aria-hidden="true">←</span> Read more posts
        </a>
      </div>

    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <span class="footer-brand">— Ahnaf Akil</span>
        <span class="footer-meta">
          <span data-year>2026</span>
          <span class="sep">·</span>
          ahnafakil.com
        </span>
      </div>
    </div>
  </footer>

  <!-- Marked.js for Markdown → HTML -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="assets/js/app.js"></script>

  <script>
    (function () {
      'use strict';

      const article = document.getElementById('post-content');
      const params  = new URLSearchParams(window.location.search);
      const slug    = params.get('slug');

      if (!slug) {
        article.innerHTML = `
          <h1>Post not found</h1>
          <p>It looks like you arrived here without a post slug. Try heading back to
          <a href="blog.html" class="inline-link">the writing index</a>.</p>`;
        return;
      }

      // Configure Marked: GitHub-flavored, breaks honored
      marked.setOptions({
        breaks: true,
        gfm: true,
        headerIds: true
      });

      // Fetch the manifest first so we get title + date metadata
      Promise.all([
        fetch('posts/posts.json', { cache: 'no-cache' }).then(r => r.json()),
        fetch(`posts/${encodeURIComponent(slug)}.md`, { cache: 'no-cache' })
          .then(r => {
            if (!r.ok) throw new Error('Post not found');
            return r.text();
          })
      ])
      .then(([posts, markdown]) => {
        const meta = (Array.isArray(posts) ? posts : [])
          .find(p => p.slug === slug);

        // Strip front-matter if present (--- ... ---)
        let body = markdown;
        const fm = body.match(/^---\s*[\s\S]*?---\s*/);
        if (fm) body = body.slice(fm[0].length);

        const dateStr = meta && meta.date
          ? new Date(meta.date).toLocaleDateString('en-US', {
              year: 'numeric', month: 'long', day: 'numeric'
            })
          : '';

        const titleStr = meta && meta.title ? meta.title : slug;

        // Update document title and OG
        document.title = `${titleStr} — Ahnaf Akil`;
        const ogTitle = document.querySelector('meta[property="og:title"]');
        if (ogTitle) ogTitle.setAttribute('content', titleStr);

        article.innerHTML = `
          ${dateStr ? `<time datetime="${meta.date}">${dateStr}</time>` : ''}
          <h1>${titleStr}</h1>
          ${marked.parse(body)}
        `;
      })
      .catch(err => {
        console.error(err);
        article.innerHTML = `
          <h1>Post not found</h1>
          <p>We couldn't load that post. It may have been moved or unpublished.
          Head back to <a href="blog.html" class="inline-link">the writing index</a>.</p>`;
      });

    })();
  </script>
</body>
</html>
