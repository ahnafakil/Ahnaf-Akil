# ============================================================
#  Decap CMS Config — ahnafakil.com
#  Auth: DecapBridge (PKCE flow, replaces deprecated Netlify Identity)
# ============================================================

# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: ahnafakil/Ahnaf-Akil
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/7315cce4-f6e3-433c-ad9e-dd0409d5985f/pkce
  auth_token_endpoint: /sites/7315cce4-f6e3-433c-ad9e-dd0409d5985f/token
  gateway_url: https://gateway.decapbridge.com
  # See who did what in commit history
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

# PKCE user identity claims (recommended for DecapBridge)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Where uploaded images live in the repo
media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"

# Show a clear publish workflow with drafts (PRs)
publish_mode: editorial_workflow

# Site metadata
site_url: https://ahnafakil.com
display_url: https://ahnafakil.com
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

collections:

  # ───────────────────────────────────────────────────────────
  # Blog Posts
  # ───────────────────────────────────────────────────────────
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Post"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}}  —  {{date | date('YYYY-MM-DD')}}"
    sortable_fields: ['date', 'title']
    fields:
      - { label: "Title",   name: "title",   widget: "string" }
      - { label: "Date",    name: "date",    widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ" }
      - { label: "Excerpt", name: "excerpt", widget: "text",
          hint: "1-2 sentence summary shown on the blog index card." }
      - { label: "Cover Image (optional)", name: "cover", widget: "image", required: false }
      - { label: "Body",    name: "body",    widget: "markdown" }

  # ───────────────────────────────────────────────────────────
  # Posts manifest (so blog.js knows what to list)
  # Decap keeps this file in sync with the posts folder
  # ───────────────────────────────────────────────────────────
  - name: "manifest"
    label: "Posts Manifest"
    files:
      - name: "posts_manifest"
        label: "Posts Manifest (auto-managed — do not edit unless needed)"
        file: "posts/posts.json"
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            fields:
              - { label: "Slug",    name: "slug",    widget: "string" }
              - { label: "Title",   name: "title",   widget: "string" }
              - { label: "Date",    name: "date",    widget: "datetime" }
              - { label: "Excerpt", name: "excerpt", widget: "text" }
              - { label: "File",    name: "file",    widget: "string" }
